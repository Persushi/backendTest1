services:
  api:
    build:
      context: .
      target: production
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/challenge
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:?GOOGLE_PLACES_API_KEY is required}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:8-noble
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  mongo_data:
